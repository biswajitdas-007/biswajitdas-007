# ─────────────────────────────────────────────────────────────────
# Generates the animated contribution snake used in README §04.
#
# SETUP (one time):
#   1. Commit this file to biswajitdas-007/biswajitdas-007
#   2. Settings → Actions → General → Workflow permissions
#      → select "Read and write permissions" → Save
#   3. Actions tab → "Generate contribution snake" → Run workflow
#
# It creates an `output` branch holding the SVGs. That branch is
# machine-generated — don't edit or merge it. If your default branch
# is `master` rather than `main`, change it under `push:` below.
# ─────────────────────────────────────────────────────────────────

name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice daily
  workflow_dispatch:          # lets you trigger it by hand
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      # svg-only is the faster variant — we don't need the GIF
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=#F0883E
            dist/snake-dark.svg?palette=github-dark&color_snake=#F0883E
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
